<!DOCTYPE HTML>
<html lang="zh">

<head>
	<meta charset="utf-8">
	<meta name="referrer" content="no-referrer">
	<title>Lazy-Trader-操作平台</title>
	<script>
		if (top !== self) {
			//top.location.href = self.location.href;  
		}
	</script>
	<style>
		body {
			-webkit-user-select: none;
			-ms-user-select: none;
			user-select: none;
			overflow-x: hidden;
			overflow-y: hidden;
			padding: 0;
			margin: 0;
		}

		.anychart-plot-controls {
			visibility: hidden;
		}
	</style>
	<script src="./js/jquery-4.0.0.min.js"></script>
	<script src="./js/jquery-ui/jquery-ui.min.js"></script>
	<link rel="stylesheet" type="text/css" href="./js/jquery-ui/jquery-ui.min.css">
	<script src="./js/long.min.js"></script>
	<script src="./js/dexie.min.js"></script>
	<script src="./js/HackTimer.silent.min.js"></script>
	<script src="./js/paipan.min.js"></script>
	<script src="./js/locutus.min.js"></script>
	<script src="https://cdn.anychart.com/releases/8.14.1/js/anychart-base.min.js"></script>
	<script src="https://cdn.anychart.com/releases/8.14.1/js/anychart-stock.min.js"></script>
	<script src="https://cdn.anychart.com/releases/8.14.1/js/anychart-annotations.min.js"></script>
	<script src="https://cdn.anychart.com/releases/8.14.1/js/anychart-ui.min.js"></script>
	<link rel="stylesheet" type="text/css" href="https://cdn.anychart.com/releases/8.14.1/css/anychart-ui.min.css">
	<script>
		window.O = { //必须放在common.js之前
			uid: 1,
			day: 0,
			pmode: 1
		};
	</script>
	<script>
		document.write('\x3Cscript src="./js/config.js?_=' + Math.random() + '">\x3C/script>');
		document.write('\x3Cscript src="./js/common.js?_=' + Math.random() + '">\x3C/script>');
		document.write('\x3Cscript src="./js/lazy.hub.js?_=' + Math.random() + '">\x3C/script>');
		document.write('\x3Cscript src="./js/lazy-trader.js?_=' + Math.random() + '">\x3C/script>');
	</script>
	<link rel="stylesheet" type="text/css" href="./styles/lazy-trader.css">
	<link rel="shortcut icon" href="./favicon.ico">
</head>

<body>
	<div id="k-container" style="display:none;"></div><!-- 主图:K线图区域 -->
	<div id="gap" class="n" style="display:none;"></div><!-- 主图左上角显示 -->
	<div id="tips" class="n" style="display:none;"></div><!-- 主图右上角时钟/价变 -->
	<div id="text" class="n" style="display:none;"></div><!-- 主图重要事件 -->
	<div id="gap1" class="n" style="display:none;"></div><!-- 主图左下角 -->
	<div id="gap2" class="n" style="display:none;"></div><!-- 主图左下角 -->
	<div id="gap3" class="n" style="display:none;"></div><!-- 主图左下角 -->
	<div id="gap4" class="n" style="display:none;"><!-- 主图左下角 -->
		<input type="checkbox" title="街货" name="street" onclick="showVol($(this).is(':checked'))" checked="checked">
		<input type="checkbox" title="打点" name="showfills" onclick="showfills($(this).is(':checked'), true)" style="margin-left:2px;">
		<input type="checkbox" title="翻转" name="inverted" onclick="inverted($(this).is(':checked'), true)" style="margin-left:2px;">
		<input type="checkbox" title="锁定" name="locker" style="margin-left:2px;">
	</div>
	<div id="opt1" class="opt" style="display:none;z-index:100;"><!-- 主图正下方买卖按钮:买入区 -->
		<button id="btn0" disabled="disabled" onclick="PlaceOrder(1, true)">强买</button>
		<button id="btn1" disabled="disabled" onclick="PlaceOrder(1, false)">买入</button>
	</div>
	<div id="opt2" class="opt" style="display:none;z-index:100;"><!-- 主图正下方买卖按钮:沽入区 -->
		<button id="btn2" disabled="disabled" onclick="PlaceOrder(3, true)">强沽</button>
		<button id="btn3" disabled="disabled" onclick="PlaceOrder(3, false)">沽入</button>
	</div>
	<div id="opt3" class="opt" style="display:none;z-index:100;"><!-- 主图正下方买卖按钮:方向区 -->
		<button id="btn4" disabled="disabled" onclick="saveAll(+1)">上移</button>
		<button id="btn5" disabled="disabled" onclick="saveAll(-1)">下移</button>
	</div>
	<div id="opt4" class="opt" style="display:none;z-index:100;width:250px;"><!-- 主图正下方买卖按钮:订单区 -->
		<button id="btn6" disabled="disabled" onclick="saveAll(5)">强出</button>
		<button id="btn7" disabled="disabled" onclick="ModifyOrder(2)">撤单</button>
		<button id="btn8" disabled="disabled" onclick="ModifyOrder(3)">失效</button>
		<button id="btn9" disabled="disabled" onclick="ModifyOrder(4)">生效</button>
		<button id="btn10" disabled="disabled" onclick="saveAll(0)">平出</button>
	</div>
	<div id="buttons" style="display:none;"><!-- 主图正上方按钮:复盘区 -->
		<button onclick="removeLine(true)">全删</button>
		<button onclick="removeLine(false)">删除</button>
		<button onclick="createLine()">添加</button>
		<input type="checkbox" title="打点" name="showfills" onclick="showfills($(this).is(':checked'), true)">
		<input type="checkbox" title="翻转" name="inverted" onclick="inverted($(this).is(':checked'), true)">
		<input type="checkbox" title="均差" name="pivoted" onclick="pivoted($(this).is(':checked'))">
	</div>
	<div id="w-container" style="display:none;"></div><!-- 窝轮街货图 -->
	<div id="p-container" style="display:none;"><!-- 盘口数据:买卖十档,实时逐笔 -->
		<table style="float:left;width:300px;"><!-- 买卖十档 -->
			<tr>
				<td id="tda" colspan="2" style="text-align:center;">&nbsp;</td>
			</tr>
			<tr>
				<td id="tda00">--</td>
				<td id="tda01">--</td>
			</tr>
			<tr>
				<td id="tda10">--</td>
				<td id="tda11">--</td>
			</tr>
			<tr>
				<td id="tda20">--</td>
				<td id="tda21">--</td>
			</tr>
			<tr>
				<td id="tda30">--</td>
				<td id="tda31">--</td>
			</tr>
			<tr>
				<td id="tda40">--</td>
				<td id="tda41">--</td>
			</tr>
			<tr>
				<td id="tda50">--</td>
				<td id="tda51">--</td>
			</tr>
			<tr>
				<td id="tda60">--</td>
				<td id="tda61">--</td>
			</tr>
			<tr>
				<td id="tda70">--</td>
				<td id="tda71">--</td>
			</tr>
			<tr>
				<td id="tda80">--</td>
				<td id="tda81">--</td>
			</tr>
		</table>
		<table style="float:left;width:300px;border-left:0px;"><!-- 实时逐笔 -->
			<tr>
				<td id="tdb00">--</td>
				<td id="tdb01">--</td>
				<td id="tdb02">--</td>
			</tr>
			<tr>
				<td id="tdb10">--</td>
				<td id="tdb11">--</td>
				<td id="tdb12">--</td>
			</tr>
			<tr>
				<td id="tdb20">--</td>
				<td id="tdb21">--</td>
				<td id="tdb22">--</td>
			</tr>
			<tr>
				<td id="tdb30">--</td>
				<td id="tdb31">--</td>
				<td id="tdb32">--</td>
			</tr>
			<tr>
				<td id="tdb40">--</td>
				<td id="tdb41">--</td>
				<td id="tdb42">--</td>
			</tr>
			<tr>
				<td id="tdb50">--</td>
				<td id="tdb51">--</td>
				<td id="tdb52">--</td>
			</tr>
			<tr>
				<td id="tdb60">--</td>
				<td id="tdb61">--</td>
				<td id="tdb62">--</td>
			</tr>
			<tr>
				<td id="tdb70">--</td>
				<td id="tdb71">--</td>
				<td id="tdb72">--</td>
			</tr>
			<tr>
				<td id="tdb80">--</td>
				<td id="tdb81">--</td>
				<td id="tdb82">--</td>
			</tr>
			<tr>
				<td id="tdb90">--</td>
				<td id="tdb91">--</td>
				<td id="tdb92">--</td>
			</tr>
		</table>
	</div>
	<div id="buy" style="display:none;"><!-- 买卖窗口 -->
		<table class="line_a">
			<tr>
				<td>代码:</td>
				<td><input type='text' id="buy_code" autocomplete="off" style="width:125px;" onchange="trd_getinfo()"></td>
				<td><select style="width:100px;" id="trd_codes" onchange="$('#buy_code').val(this.value);trd_getinfo();"></select></td>
			</tr>
			<tr>
				<td>名称:</td>
				<td colspan="2"><span id="buy_name"></span></td>
			</tr>
			<tr>
				<td>价格:</td>
				<td><input type="button" value="-" style="width:22px;" onclick="$('#buy_price').val(gear_down($('#buy_price').val(), 1, $('#buy_code').val()));trd_calc();"><input type='text' id='buy_price' autocomplete="off" onchange="trd_calc();" style="width:80px;"><input type="button" value="+" style="width:23px;" onclick="$('#buy_price').val(gear_up($('#buy_price').val(), 1, $('#buy_code').val()));trd_calc();"></td>
				<td><select id="buy_select" onchange="$('#buy_price').val(this.value);" style="width:100px;"></select></td>
			</tr>
			<tr>
				<td>数量:</td>
				<td>
					<input type="button" value="-" style="width:22px;" onclick="$('#buy_qty').val(Math.max(0, intval($('#buy_qty').val()) - 1));trd_calc();"><input type='text' id='buy_qty' autocomplete="off" style="width:80px;" onchange="trd_calc();"><input type="button" value="+" style="width:23px;" onclick="$('#buy_qty').val(intval($('#buy_qty').val()) + 1);trd_calc();">
				</td>
				<td>手<span id="buy_lotsize"></span></td>
			</tr>
			<tr>
				<td>金额:</td>
				<td colspan="2"><span id="buy_total"></span></td>
			</tr>
			<tr>
				<td><input type="button" value="拉取" onclick="trd_getinfo()"></td>
				<td colspan="1" style="text-align:center;">
					<input type="hidden" id="buy_lot">
					<input type="hidden" id="buy_trdSide">
					<input type="hidden" id="buy_id">
					<input type="button" id="buy_submit" value="*" onclick="trd_submit();">
				</td>
				<td>
					<input type="button" style="display:block;" value="取消" onclick="$('#buy').dialog('close');">
				</td>
			</tr>
		</table>
	</div>
	<div id="trader" class="trader" style="display:none;"><!-- 页面交易区 -->
		<table class="line_a" style="width:100%;padding:0px;margin:0px;" id="trd_fund"><!-- 资金相关 -->
			<tr>
				<td><input type="button" value="买入" disabled="disabled" id="trd1" onclick="trd_dialog('', 1, 0);"></td>
				<td><input type="button" value="沽入" disabled="disabled" id="trd3" onclick="trd_dialog('', 3, 0);"></td>
				<td><input type="button" value="买熊" disabled="disabled" id="trd8" onclick="trd_dialog('', 1, 4);"></td>
				<td><input type="button" value="买牛" disabled="disabled" id="trd7" onclick="trd_dialog('', 1, 3);"></td>
				<td>今日:<span class="td_plVal">0</span></td>
				<td>持仓:<span class="plVal">0</span></td>
				<td>费用:<span class="new_heji">0</span></td>
				<td>更新:<span class="uptime">00:00:00</span></td>
			</tr>
		</table>
		<table class="line_a" style="width:100%;padding:0px;margin:0px;" id="trd_position"><!-- 持仓列表 -->
			<tr>
				<th>代码</th>
				<th>名称</th>
				<th>方向</th>
				<th>持有数量@市价</th>
				<th>可用数量</th>
				<th>成本价</th>
				<th>市值</th>
				<th>盈亏比例</th>
				<!--<th>盈亏金额</th>-->
				<th>今日盈亏</th>
				<!--<th>今日成交额</th>
				<th>今日买入@均价</th>
				<th>今日卖出@均价</th>-->
				<th>操作</th>
			</tr>
		</table>
		<table class="line_a" style="width:100%;padding:0px;margin:0px;" id="trd_order"><!-- 订单列表 -->
			<tr>
				<th style="padding:0px;">
					<select style="width:65px;" onchange="trd_show(true);" id="trd_show_select">
						<option value="0">全部</option>
						<option value="11">已成交</option>
						<option value="22">失效</option>
						<option value="5" selected='selected'>待成交</option>
					</select>
				</th>
				<th>方向</th>
				<th>代码</th>
				<th>名称</th>
				<th>订单价格</th>
				<th>订单手数</th>
				<th>已成交@均价</th>
				<th>操作</th>
				<th>操作</th>
				<th>最后更新</th>
			</tr>
		</table>
		<table class="line_a" style="width:100%;padding:0px;margin:0px;" id="trd_news"></table><!-- 资讯区 -->
	</div>
</body>

</html>
